<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--comentario em html-->
    
    <script>
        //1. let é usado para variaveis que podem mudar
        let nomeAluno = "Maria";
        let idade = 20;
        idade = 21; // ✅posso alterar depois
        
        //2. const é usado para valores fixos(constante)
        const TAXA_JUROS = 0.05; 
        // TAVA_JUROS = 0.10; ❌Erro! const não pode mudar 

        //3. console.log(); exibindo no console (F12)
        console.log(nomeAluno); // "Maria"
        console.log(idade); // 21

        //1. String
        let nome = "Ana"; // aspas duplas
        let cidade = 'São Paulo' // aspas simples
        let mensagem = `Olá, ${nome}!`; //tamplate literal (moderno) crase
        console.log(mensagem); // "Ola, Ana"
        
        //2. Number - numeros (inteiros e decimais)
        let pontos = 100;
        let temperatura = 36.7;
        let saldo = -50; // pode ser negativo

        //3.Boolean - verdadeiro ou falso
        let estaLogado = true;
        let temDesconto = false;

        //4. Undefined - variável declarada mas sem valor
        let resultado;
        console.log(resultado); // undefined

        //5. Null - ausencia intencional de valor
        let usuarioAtivo - null;

        // Descobrir o tipo de qualquer valor
        console.log(typeof nome); //String
        console.log(typeof pontos); // number
        console.log(typeof estaLogado); // boolean
        
    </script>
</body>
</html>
