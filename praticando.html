    <!--comentario em html-->
    
    <script>
        //1. let é usado para variaveis que podem mudar
        let nomeAluno = "Maria";
        let idade = 20;
        idade = 21; // ✅posso alterar depois
        
        //2. const é usado para valores fixos(constante)
        const TAXA_JUROS = 0.05; 
        // TAVA_JUROS = 0.10; ❌Erro! const não pode mudar 

        //3. console.log(); exibindo no console (F12)
        console.log(nomeAluno); // "Maria"
        console.log(idade); // 21
    </script>
