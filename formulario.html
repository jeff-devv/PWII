<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
    <link rel="stylesheet" type="text/css" href="formulario.css">
</head>
<body>
    <div class="contorno">
        <h1>Ficha de Cadastrada</h1>
        <p>Prencha os campos abaixo com suas informações para se cadastrar em nosso banco de talentos</p>
        <p>É inportante que nenhum campo fique em branco para facitar nosso contato com você.</p>

        <form action="process.php" method="post"> <!-- o "post" é usado para preenchimento para DB, e o "get" é usado para buscas e pesquisas-->
            <input type="text" name="nome" id="nomeDigitado" placeholder="Nome"><br><br>    
            <input type="text" name="email" id="emailDigitado" placeholder="E-mail"><br><br> 
            <input type="text" name="endereco" id="enderecoDigitado" placeholder="Endereço"><br><br>
            <!-- 
                type = "submit" dentro de um <form> envia os dados ao action.
                O onclick ainda chama validarFormulario() antes de anviar -
                se a função retornar false, o envio é cancelado.
            -->
            
            <button type="submit" onclick="validarFormulario()">Cadastrar</button>
        </form>
    </div>

    <script>

        //objeto para pegar referencia do campo texto - document.getElementById("variável");
        //colocando o foco no campo de nome para facilitar o preenchimento do formulário - .focus();
        document.getElementById("nomeDigitado").focus();
        
        function validarFormulario(){
            let nome = document.getElementById("nomeDigitado").value;
            let email = document.getElementById("emailDigitado").value;
            let endereco = document.getElementById("enderecoDigitado").value;

            if(nome === ""){
                alert("Por favor, preencha o campo do nome");
                document.getElementById("nomeDigitado").style.boxShadow = "3px 3px 5px yellow";
                return false
            }else if(email === ""){
                 alert("Por favor, preencha o campo do email");
                document.getElementById("emailDigitado").style.boxShadow = "3px 3px 5px yellow";
                return false
            }else if(endereco === ""){
                alert("Por favor, preencha o campo do endereco");
                document.getElementById("enderecoDigitado").style.boxShadow = "3px 3px 5px yellow";
                return false
            }else{
                alert("Cadastrado com sucesso")
            }

            return true;//libera o envio para o processo.php
        }
        

    </script>
</body>
</html>
