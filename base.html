        //1. let é usado para variaveis que podem mudar

        let mensagem = `Olá, ${nome}!`; //tamplate literal (moderno) crase
        console.log(mensagem); // "Ola, Ana"

        let estaLogado = true;

        // Descobrir o tipo de qualquer valor
        console.log(typeof nome); //String
        console.log(typeof pontos); // number
        console.log(typeof estaLogado); // boolean

        //--- Operadores Aritimédicos ---
        let a = 10, b= 3;
        
        console.log(a + b); // 13 (adição)
        console.log(a - b); // 7 (subtração)
        console.log(a * b); // 30 (multiplicação)
        console.log(a / b); // 3.33 (divisão)
        console.log(a % b); // 1 (resto da divisão)
        console.log(a ** b); // 1000 (potência: 10³)

        // --- Operadores de Comparação ---
        console.log(5 === 5); // true (igual em valor E tipo)
        console.log(5 != 4); // true (diferente)
        console.log(10 > 8); // true (maior que)
        console.log(5 <= 5); // true menor ou igual

        // --- Cuidado: == vs ===---
        console.log(5 == '5'); // true (faz conversão automática)
        console.log(5 === '5'); // false (mais rigoroso, prefira este! ele tem 3 =)

        // --- Operadores Lógicos --
        console.log(true && false); // false (E: ambos precisam ser true)
        console.log(tue || false); // true: (OU: basta um ser true)
        console.log(!true); // false(NÃO: inverte o valor) 

        // --- Concatenação de Strings---
        let primeiroNome = "João";
        let sobrenome = "Silva";
        let nomeCompleto = primeiroNome + " " + sobrenome;
        console.log(nomeCompleto); // "João Silva"

        // Forma moderna com template literals
        console.log(`Nome: ${primeiroNome} ${sobrenome}`)// Nome: João Silva

        // --- Forma Clássica (Function Declaration) ---
        function saudar(nome){
            return `Olá, ${noem}! Benvindo ao JavaScript!`
        }

        // Chamando a função
        let mensagemm = saudar("Ana");
        console.log(mensagemm); // "Olá, Ana" Bem-vinda ao JavaScript!"
        console.log(saudar("Carlos")); // "Olá, Carlos! Benvindo ao JavaScropt!"

        // Função com multiplos parâmetros ---
        function calcularArea(largura, altura){
            let area = largura * altura;
            return area;
        }

        console.log(calcularArea(5, 3)); // 15
        console.log(calcularArea(10, 4)); // 40

        //--- Arow Funcition( forma moderna) ---
        const dobrar = (numero) => numero * 2;
        console.log(dobrar(7)); // 14

        //Arrow function com multiplas linhas
        const somar = (a, b) =>{
            let resultado = a + b;
            return resultado
        };
        console.log(somar(4, 6)); // 10

        // --- Escopo Global vs Local
        let name = "Global"; // visivel em todo lugar

        function minhaFuncao(){
            let lastName = "Local"; // so existe aqui dentro {}
            console.log(name); // global(função acessa externo)
            console.log(lastName)// local
        }

        minhaFuncao();
        console.log(name); // global
